# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
[project.theme]
# TODO: re-enable `custom_dir = "overrides"` once the partials in
# overrides/ (header, footer, copyright, home.html, blog.html) are ported
# to Zensical's template context. The mkdocs-material variables they
# reference (e.g. config.extra.social, page.meta) don't exist in Zensical
# yet — enabling custom_dir floods the build with template errors.
language   = "en"
favicon    = "assets/favicon.png"
logo       = "assets/images/logotype.svg"

features = [
    "announce.dismiss",
    "navigation.sections",
    "navigation.tabs",
    "navigation.footer",
    "navigation.tracking",
    "navigation.indexes",
    "search.highlight",
    "search.suggest",
    "toc.follow",
    "content.action.edit",
    "content.action.view",
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

# Dark mode (default — matches the historical ExpressLRS palette)
[[project.theme.palette]]
media  = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Light mode
[[project.theme.palette]]
media  = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

